</head>
<body>

<!-- ── 以下为网站结构，由 JS 自动填充内容，通常不需要改动 ── -->

<nav>
  <a class="nav-logo" href="#" id="nav-name"></a>
  <ul class="nav-links">
    <li><a href="#gallery" id="nl-work">Work</a></li>
    <li><a href="#about"   id="nl-about">About</a></li>
    <li><a href="#contact" id="nl-contact">Contact</a></li>
  </ul>
  <button class="nav-lang" onclick="toggleLang()" id="lang-btn">中文</button>
</nav>

<section class="hero">
  <div class="hero-image-col">
    <div class="hero-photo-bg"></div>
    <div class="hero-photo-overlay"></div>
    <svg class="hero-shapes" viewBox="0 0 600 800" preserveAspectRatio="xMidYMid slice">
      <defs><radialGradient id="sun" cx="70%" cy="30%"><stop offset="0%" stop-color="#FFF8D0" stop-opacity="0.5"/><stop offset="100%" stop-color="#F2A93B" stop-opacity="0"/></radialGradient></defs>
      <ellipse cx="420" cy="180" rx="200" ry="160" fill="url(#sun)"/>
      <path d="M0 600 L100 380 L200 480 L300 260 L400 420 L500 300 L600 450 L600 800 L0 800 Z" fill="#1C4A3A" opacity="0.55"/>
      <path d="M0 650 L80 500 L160 580 L260 400 L360 520 L460 380 L560 470 L600 420 L600 800 L0 800 Z" fill="#163D30" opacity="0.7"/>
      <rect x="0" y="380" width="600" height="60" fill="#8FC9B0" opacity="0.15"/>
      <path d="M80 150 Q90 142 100 150" stroke="rgba(255,255,255,0.6)" stroke-width="1.2" fill="none"/>
      <path d="M110 140 Q122 132 134 140" stroke="rgba(255,255,255,0.5)" stroke-width="1.2" fill="none"/>
    </svg>
    <div class="hero-location" id="h-loc"></div>
    <div class="hero-badge">
      <div class="badge-num" id="badge-num"></div>
      <div class="badge-lbl" id="badge-lbl"></div>
    </div>
  </div>
  <div class="hero-text-col">
    <p class="hero-series-tag" id="h-tag"></p>
    <h1 class="hero-title" id="h-title"></h1>
    <p class="hero-desc"    id="h-desc"></p>
    <p class="hero-desc-zh" id="h-desc-zh" style="display:none"></p>
    <div class="hero-color-tags">
      <span class="hero-color-tag tag-nature" id="ct-nature"></span>
      <span class="hero-color-tag tag-arch"   id="ct-arch"></span>
      <span class="hero-color-tag tag-doc"    id="ct-doc"></span>
      <span class="hero-color-tag tag-street" id="ct-street"></span>
    </div>
    <a href="#gallery" class="hero-scroll" id="h-cta">
      <span class="scroll-arrow">↓</span><span id="h-cta-txt"></span>
    </a>
  </div>
</section>

<div class="series-bar" id="series-bar"></div>
<section id="gallery">
  <div class="gallery-header">
    <div>
      <div class="gallery-title" id="g-title"></div>
      <div class="gallery-sub"   id="g-sub"></div>
    </div>
    <div class="gallery-count" id="g-count"></div>
  </div>
  <div class="photo-grid" id="photo-grid"></div>
</section>

<section id="about">
  <div>
    <p class="about-eyebrow" id="ab-eye"></p>
    <h2 class="about-name" id="ab-name"></h2>
    <p class="about-body"    id="ab-body"></p>
    <p class="about-body-zh" id="ab-body-zh" style="display:none"></p>
    <div class="about-tags"  id="ab-tags"></div>
    <div class="stat-grid"   id="stat-grid"></div>
  </div>
  <div class="about-collage" id="collage"></div>
</section>

<section id="contact">
  <div class="contact-bg"></div>
  <div class="contact-glow glow1"></div>
  <div class="contact-glow glow2"></div>
  <div class="contact-inner">
    <p class="contact-eyebrow" id="c-eye"></p>
    <h2 class="contact-title"  id="c-title"></h2>
    <p class="contact-sub"     id="c-sub"></p>
    <div class="contact-btns"  id="c-btns"></div>
  </div>
</section>

<footer>
  <span id="f-copy"></span>
  <span id="f-vcg"></span>
</footer>

<div class="lightbox" id="lightbox" onclick="closeLb(event)">
  <button class="lb-close" onclick="closeLb()">✕</button>
  <div class="lb-inner" id="lb-inner">
    <div class="lb-meta">
      <div><div class="lb-title-en" id="lb-en"></div><div class="lb-title-zh" id="lb-zh"></div></div>
      <div class="lb-loc" id="lb-loc"></div>
    </div>
  </div>
</div>

<script>
/* ============================================================
   ⚙️  以下为渲染逻辑，不需要修改
   ============================================================ */

// 应用主题色
const R = document.documentElement.style;
R.setProperty('--coral', THEME.coral);
R.setProperty('--gold',  THEME.gold);
R.setProperty('--green', THEME.green);
R.setProperty('--rose',  THEME.rose);
R.setProperty('--ink',   THEME.ink);

let lang = 'en';
let currentSeries = 'all';
const C = SITE_CONFIG;

const SERIES_META = {
  all:    { en:'<em>Selected</em> Work',        zh:'精选作品',   dot:'#E8503A' },
  nature: { en:'<em>Nature</em> & Landscape',   zh:'自然风光',   dot:'#3A7D5A' },
  arch:   { en:'<em>Architecture</em>',          zh:'建筑',       dot:'#F2A93B' },
  people: { en:'<em>Documentary</em>',           zh:'人文纪实',   dot:'#D4637A' },
  street: { en:'<em>Street</em>',                zh:'街拍',       dot:'#4A5ADE' },
};
const SERIES_LABEL = {
  nature: { en:'Nature',        zh:'自然风光', pill:'#2E6B4A' },
  arch:   { en:'Architecture',  zh:'建筑',     pill:'#C47B10' },
  people: { en:'Documentary',   zh:'人文纪实', pill:'#A83058' },
  street: { en:'Street',        zh:'街拍',     pill:'#3040AA' },
};

// PLACEHOLDER SVGs per series
const PLACEHOLDERS = {
  nature: (h) => `<defs><linearGradient id="pg" x1="0" y1="0" x2="0.3" y2="1"><stop offset="0%" stop-color="#87C4E8"/><stop offset="40%" stop-color="#C8E4D8"/><stop offset="100%" stop-color="#4A9B7A"/></linearGradient></defs><rect width="600" height="${h}" fill="url(#pg)"/><ellipse cx="300" cy="90" rx="200" ry="60" fill="#FFF8E8" opacity="0.35"/><path d="M0 ${h*0.73} L80 ${h*0.53} L160 ${h*0.65} L260 ${h*0.43} L360 ${h*0.63} L480 ${h*0.4} L600 ${h*0.57} L600 ${h} L0 ${h}Z" fill="#2A5A3A" opacity="0.6"/><path d="M0 ${h*0.85} L60 ${h*0.72} L160 ${h*0.8} L240 ${h*0.65} L340 ${h*0.78} L440 ${h*0.6} L600 ${h*0.73} L600 ${h} L0 ${h}Z" fill="#1A3D28" opacity="0.82"/>`,
  arch:   (h) => `<defs><linearGradient id="pg" x1="0" y1="0" x2="0.5" y2="1"><stop offset="0%" stop-color="#F7D99A"/><stop offset="55%" stop-color="#E8943A"/><stop offset="100%" stop-color="#8B4A14"/></linearGradient></defs><rect width="600" height="${h}" fill="url(#pg)"/><ellipse cx="300" cy="40" rx="180" ry="100" fill="#FFF8C0" opacity="0.22"/><path d="M60 ${h} L60 ${h*0.55} Q60 ${h*0.36} 100 ${h*0.36} Q140 ${h*0.36} 140 ${h*0.55} L140 ${h}" fill="#6B3A12" opacity="0.55"/><path d="M200 ${h} L200 ${h*0.45} Q200 ${h*0.26} 250 ${h*0.26} Q300 ${h*0.26} 300 ${h*0.45} L300 ${h}" fill="#5A3010" opacity="0.6"/><rect x="0" y="${h*0.9}" width="600" height="${h*0.1}" fill="#3A1C08" opacity="0.7"/>`,
  people: (h) => `<defs><linearGradient id="pg" x1="0.2" y1="0" x2="0.8" y2="1"><stop offset="0%" stop-color="#E8C49A"/><stop offset="45%" stop-color="#D4845A"/><stop offset="100%" stop-color="#7A3A22"/></linearGradient></defs><rect width="600" height="${h}" fill="url(#pg)"/><ellipse cx="150" cy="${h*0.22}" rx="90" ry="70" fill="#FFF0C0" opacity="0.3"/><ellipse cx="180" cy="${h*0.67}" rx="28" ry="36" fill="#5A2A12" opacity="0.7"/><rect x="155" y="${h*0.76}" width="50" height="${h*0.24}" rx="8" fill="#4A2210" opacity="0.75"/><ellipse cx="420" cy="${h*0.64}" rx="26" ry="32" fill="#3A1A08" opacity="0.7"/><rect x="398" y="${h*0.73}" width="44" height="${h*0.27}" rx="7" fill="#2E1408" opacity="0.75"/><rect x="0" y="${h*0.88}" width="600" height="${h*0.12}" fill="#2A1008" opacity="0.6"/>`,
  street: (h) => `<defs><linearGradient id="pg" x1="0" y1="0" x2="0.4" y2="1"><stop offset="0%" stop-color="#1C2A5A"/><stop offset="50%" stop-color="#2E4A8A"/><stop offset="100%" stop-color="#0A1230"/></linearGradient></defs><rect width="600" height="${h}" fill="url(#pg)"/><rect x="0" y="${h*0.71}" width="600" height="${h*0.29}" fill="#0A1840" opacity="0.8"/><ellipse cx="200" cy="${h*0.77}" rx="60" ry="8" fill="#F2A93B" opacity="0.35"/><ellipse cx="400" cy="${h*0.79}" rx="45" ry="6" fill="#E84858" opacity="0.3"/><circle cx="520" cy="${h*0.25}" r="18" fill="#E84848" opacity="0.6"/><rect x="40" y="${h*0.54}" width="120" height="${h*0.17}" rx="6" fill="#0A1230" opacity="0.9"/><rect x="310" y="${h*0.52}" width="150" height="${h*0.19}" rx="7" fill="#0A1230" opacity="0.85"/>`,
};

function photoHeight(idx) {
  const heights = [300,220,260,200,280,240,320,260,180,300,240,220];
  return heights[idx % heights.length];
}

function renderNav() {
  const [first, ...rest] = C.photographer.name_en.split(' ');
  document.getElementById('nav-name').innerHTML = `${first}<span class="dot">.</span>`;
}

function renderHero() {
  const zh = lang === 'zh';
  document.getElementById('h-tag').textContent  = zh ? C.photographer.tagline_zh : C.photographer.tagline_en;
  document.getElementById('h-loc').textContent  = zh ? C.photographer.location_zh : C.photographer.location_en;
  document.getElementById('badge-num').textContent = C.hero.series_count;
  document.getElementById('badge-lbl').textContent = zh ? '系列' : 'Series';
  // title
  const h = C.hero;
  const c = h.line3_color || 'coral';
  document.getElementById('h-title').innerHTML =
    `${h.line1_en}<br>${h.line2_en}${h.line2_italic_en ? ` <span class="${c}">${h.line2_italic_en}</span>` : ''}<br><span class="${c}">${h.line3_italic_en}</span>`;
  document.getElementById('h-desc').textContent   = C.photographer.bio_en;
  document.getElementById('h-desc-zh').textContent = C.photographer.bio_zh;
  document.getElementById('h-desc').style.display   = zh ? 'none' : '';
  document.getElementById('h-desc-zh').style.display = zh ? '' : 'none';
  document.getElementById('ct-nature').textContent = zh ? '自然风光' : '自然 Nature';
  document.getElementById('ct-arch').textContent   = zh ? '建筑' : '建筑 Arch';
  document.getElementById('ct-doc').textContent    = zh ? '人文纪实' : '人文 Doc';
  document.getElementById('ct-street').textContent = zh ? '街拍' : '街拍 Street';
  document.getElementById('h-cta-txt').textContent = zh ? '查看作品' : 'View Work';
}

function renderSeriesBar() {
  const bar = document.getElementById('series-bar');
  bar.innerHTML = Object.entries(SERIES_META).map(([key, s]) => `
    <button class="series-tab${key===currentSeries?' active':''}" onclick="filterSeries('${key}',this)">
      <span class="dot" style="background:${key==='all'?'var(--coral)':s.dot}"></span>
      ${lang==='zh' ? s.zh : (key==='all'?'All Work':s.zh)}
    </button>`).join('');
}

function renderGallery() {
  const zh = lang === 'zh';
  const s = SERIES_META[currentSeries];
  document.getElementById('g-title').innerHTML = s.en;
  document.getElementById('g-sub').textContent = s.zh;
  const filtered = currentSeries === 'all' ? PHOTOS : PHOTOS.filter(p => p.series === currentSeries);
  document.getElementById('g-count').textContent = filtered.length + (zh ? ' 张作品' : ' photographs');
  const grid = document.getElementById('photo-grid');
  grid.innerHTML = filtered.map((p, idx) => {
    const h = photoHeight(idx);
    const sl = SERIES_LABEL[p.series];
    const pillText = zh ? sl.zh : sl.en;
    let thumbHTML;
    if (p.image) {
      thumbHTML = `<img class="thumb" src="${p.image}" alt="${p.title_en}" style="height:${h}px;">`;
    } else {
      thumbHTML = `<svg class="thumb" viewBox="0 0 600 ${h}" preserveAspectRatio="xMidYMid slice" style="background:${p.color}">${PLACEHOLDERS[p.series](h)}</svg>`;
    }
    return `<div class="photo-item" onclick="openLb(${PHOTOS.indexOf(p)})">
      ${thumbHTML}
      <span class="p-pill" style="background:${sl.pill};color:#fff">${pillText}</span>
      <div class="photo-overlay">
        <div class="p-title-en">${p.title_en}</div>
        <div class="p-title-zh">${p.title_zh}</div>
        <div class="p-loc">${p.location}</div>
      </div>
    </div>`;
  }).join('');
}

function renderAbout() {
  const zh = lang === 'zh';
  document.getElementById('ab-eye').textContent = zh ? '关于摄影师' : 'About the photographer';
  const [fn, ...ln] = C.photographer.name_en.split(' ');
  document.getElementById('ab-name').innerHTML = `${fn} <em>${ln.join(' ')}</em>`;
  document.getElementById('ab-body').textContent    = C.photographer.bio_en;
  document.getElementById('ab-body-zh').textContent = C.photographer.bio_zh;
  document.getElementById('ab-body').style.display    = zh ? 'none' : '';
  document.getElementById('ab-body-zh').style.display = zh ? '' : 'none';
  // tags
  const tags = [
    {text: C.photographer.affiliation, hl: true},
    {text: C.photographer.location_en.split(' · ')[1] || C.photographer.location_en},
    C.photographer.brand ? {text: C.photographer.brand} : null,
    {text: C.photographer.region},
  ].filter(Boolean);
  document.getElementById('ab-tags').innerHTML = tags.map(t =>
    `<span class="about-tag${t.hl?' hl':''}">${t.text}</span>`).join('');
  // stats
  document.getElementById('stat-grid').innerHTML = C.stats.map(s => `
    <div>
      <div class="stat-num ${s.color}">${s.num}</div>
      <div class="stat-label">${zh ? s.label_zh : s.label_en}</div>
    </div>`).join('');
  // collage (picks first nature, arch, street photo for the 3 cards)
  const picks = { nature: PHOTOS.find(p=>p.series==='nature'), arch: PHOTOS.find(p=>p.series==='arch'), street: PHOTOS.find(p=>p.series==='street') };
  const card = (p, series, style, label) => {
    const sl = SERIES_LABEL[series];
    if (!p) return '';
    const inner = p.image
      ? `<img src="${p.image}" alt="${p.title_en}">`
      : `<svg viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice" style="background:${p.color}">${PLACEHOLDERS[series](300)}</svg>`;
    return `<div class="collage-card" style="${style}">${inner}<span class="collage-lbl">${label}</span></div>`;
  };
  document.getElementById('collage').innerHTML =
    card(picks.nature, 'nature', 'top:0;left:0;right:5rem;bottom:5rem;', zh?'自然 · Nature':'自然 · Nature') +
    card(picks.arch,   'arch',   'top:3rem;right:0;width:52%;height:44%;box-shadow:0 12px 40px rgba(28,34,64,0.18);', zh?'建筑 · Architecture':'建筑 · Arch') +
    card(picks.street, 'street', 'bottom:0;right:1rem;width:45%;height:38%;box-shadow:0 12px 40px rgba(28,34,64,0.2);', zh?'街拍 · Street':'街拍 · Street');
}

function renderContact() {
  const zh = lang === 'zh';
  document.getElementById('c-eye').textContent = zh ? '联系合作' : 'Get in touch';
  const [h1, h2] = (zh ? C.contact.heading_zh : C.contact.heading_en).split(/(?<=\S)\s+(?=\S{3,}$)/);
  document.getElementById('c-title').innerHTML = h1 + (h2 ? `<br><em>${h2}</em>` : '');
  document.getElementById('c-sub').textContent = zh ? C.contact.subline_zh : C.contact.subline_en;
  const btns = [
    { href: `mailto:${C.contact.email}`, label_en: 'Email Me',     label_zh: '发送邮件', primary: true },
    { href: C.contact.instagram,         label_en: 'Instagram',    label_zh: 'Instagram' },
    { href: C.contact.vcg,               label_en: 'VCG Portfolio',label_zh: 'VCG 视觉中国' },
    C.contact.wechat ? { href: '#',      label_en: 'WeChat',       label_zh: 'WeChat' } : null,
  ].filter(Boolean);
  document.getElementById('c-btns').innerHTML = btns.map(b =>
    `<a href="${b.href}" class="contact-btn ${b.primary?'btn-primary':'btn-ghost'}">${zh ? b.label_zh : b.label_en}</a>`
  ).join('');
}

function renderFooter() {
  const year = new Date().getFullYear();
  document.getElementById('f-copy').textContent = `© ${year} ${C.photographer.name_en} · All rights reserved`;
  document.getElementById('f-vcg').textContent  = `Images licensed via ${C.photographer.affiliation} · 视觉中国`;
}

function filterSeries(series, btn) {
  currentSeries = series;
  renderSeriesBar();
  renderGallery();
}

function openLb(idx) {
  const p = PHOTOS[idx];
  if (!p) return;
  const h = photoHeight(idx);
  const inner = document.getElementById('lb-inner');
  const existing = inner.querySelector('img, svg');
  if (existing) existing.remove();
  let el;
  if (p.image) {
    el = document.createElement('img');
    el.src = p.image; el.alt = p.title_en;
  } else {
    el = document.createElementNS('http://www.w3.org/2000/svg','svg');
    el.setAttribute('viewBox',`0 0 600 ${h}`);
    el.setAttribute('preserveAspectRatio','xMidYMid slice');
    el.style.background = p.color;
    el.innerHTML = PLACEHOLDERS[p.series](h);
  }
  inner.insertBefore(el, inner.firstChild);
  document.getElementById('lb-en').textContent  = p.title_en;
  document.getElementById('lb-zh').textContent  = p.title_zh;
  document.getElementById('lb-loc').textContent = p.location;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLb(e) {
  if (e && e.target !== document.getElementById('lightbox') && !e.target.classList.contains('lb-close')) return;
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => {
  if (e.key==='Escape') { document.getElementById('lightbox').classList.remove('open'); document.body.style.overflow=''; }
});

function toggleLang() {
  lang = lang === 'en' ? 'zh' : 'en';
  document.getElementById('lang-btn').textContent = lang === 'zh' ? 'EN' : '中文';
  renderAll();
}

function renderAll() {
  renderNav();
  renderHero();
  renderSeriesBar();
  renderGallery();
  renderAbout();
  renderContact();
  renderFooter();
}

renderAll();
</script>
</body>
</html>
